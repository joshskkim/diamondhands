# SLO-based alerting for the Diamond API. Prometheus evaluates these and surfaces firing
# alerts at http://localhost:9090/alerts. In prod they're routed to Alertmanager, which emails
# them (see compose.prod.yml + monitoring/alertmanager-entrypoint.sh); locally the Prometheus
# Alerts tab is enough to demonstrate the rules.
#
# SLOs:
#   - Availability: 5xx error ratio < 1% (page at > 5%).
#   - Latency:      p95 of http.server.requests < 1s.
#   - Saturation:   no sustained HikariCP connection waiting (the leaderboard meltdown).
groups:
  - name: diamond-availability
    rules:
      # The keystone "is it up?" alert: Prometheus can't scrape the API at all. Catches a
      # crashed/OOM'd/unreachable API before the latency/error SLOs would even have data.
      - alert: ApiDown
        expr: up{job="diamond-api"} == 0
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "diamond-api is down (unscrapable for 2m)"
          description: "Prometheus cannot reach the API /actuator/prometheus endpoint — the service may be crashed or unreachable."

  - name: diamond-api-slo
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{application="diamond-api", outcome="SERVER_ERROR"}[5m]))
          /
          sum(rate(http_server_requests_seconds_count{application="diamond-api"}[5m])) > 0.05
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "API 5xx error ratio above 5% for 5m"
          description: "Availability SLO breach (target < 1% errors)."

      - alert: HighRequestLatencyP95
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_server_requests_seconds_bucket{application="diamond-api"}[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency above 1s for 5m"
          description: "Latency SLO breach (target p95 < 1s). Check the slow-endpoint and HikariCP panels."

      # Directly targets the failure mode behind the leaderboard meltdown: requests blocking
      # because every pooled DB connection is in use.
      - alert: HikariConnectionsWaiting
        expr: hikaricp_connections_pending{application="diamond-api"} > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Threads waiting for a DB connection for 2m"
          description: "HikariCP pool saturation — a slow query or traffic spike is starving the pool."

      - alert: HikariPoolExhausted
        expr: |
          hikaricp_connections_active{application="diamond-api"}
          >= hikaricp_connections_max{application="diamond-api"}
        for: 1m
        labels:
          severity: page
        annotations:
          summary: "HikariCP pool fully utilized (active == max) for 1m"
          description: "Imminent connection-timeout errors; investigate slow queries (Jaeger) immediately."

  # Host saturation (from node-exporter). Added after the 2026-07-04 outage, where the root
  # disk filled to 100% (Docker image bloat) and the first anyone knew of it was Postgres
  # crash-looping on a checkpoint it couldn't write. These page/warn while there's still runway.
  - name: diamond-host
    rules:
      - alert: DiskSpaceFillingUp
        expr: |
          node_filesystem_avail_bytes{job="node", mountpoint="/", fstype!~"tmpfs|overlay"}
          / node_filesystem_size_bytes{job="node", mountpoint="/", fstype!~"tmpfs|overlay"} < 0.20
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Root disk below 20% free on the VPS"
          description: "Free space on / is under 20%. Reclaim before it becomes critical — `docker image prune -af` clears superseded deploy images."

      - alert: DiskSpaceCritical
        expr: |
          node_filesystem_avail_bytes{job="node", mountpoint="/", fstype!~"tmpfs|overlay"}
          / node_filesystem_size_bytes{job="node", mountpoint="/", fstype!~"tmpfs|overlay"} < 0.10
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "Root disk below 10% free on the VPS"
          description: "Critically low disk on /. At 0% Postgres can't write its checkpoint and crash-loops (2026-07-04). Reclaim now: `docker image prune -af && docker builder prune -af`."
