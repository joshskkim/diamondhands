global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: diamond-api
    metrics_path: /actuator/prometheus
    static_configs:
      # The API runs on the host (mvn spring-boot:run), not in compose, so reach it
      # via the docker host gateway.
      - targets: ["host.docker.internal:8080"]
        labels:
          application: diamond-api
