global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

# Deliver firing alerts to Alertmanager (email receiver — see monitoring/alertmanager-entrypoint.sh).
# If Alertmanager isn't running, Prometheus just logs a delivery warning; nothing else breaks.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: diamond-api
    metrics_path: /actuator/prometheus
    static_configs:
      # In the prod stack the API is a compose service on the shared network.
      - targets: ["api:8080"]
        labels:
          application: diamond-api

  - job_name: diamond-mcp
    metrics_path: /metrics
    static_configs:
      - targets: ["mcp-server:8090"]
        labels:
          application: diamond-mcp
