name: Deploy

# Push to main → build images → deploy to the VPS. The test gate is the PR pipeline
# (api-ci.yml); enable branch protection requiring "API CI" so nothing reaches main
# without passing tests.
on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diamond-api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diamond-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ vars.DOMAIN }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_SENTRY_RELEASE=${{ github.sha }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diamond-web:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diamond-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ingester
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ingester/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diamond-ingester:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diamond-ingester:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push MCP server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: mcp-server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diamond-mcp:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diamond-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    # Skip (don't fail) until prod is wired up: the DOMAIN repo variable is the
    # "configured" signal — it's also the web build origin and the smoke-test host.
    # Until it's set, build-push still runs so images keep getting validated.
    if: ${{ vars.DOMAIN != '' }}
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/diamond
            git pull --ff-only
            # Pin this deploy to the exact images just built.
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f compose.prod.yml pull
            docker compose -f compose.prod.yml up -d   # flyway migrates before api starts
            docker image prune -f

            # Smoke test: don't call a deploy green until the live site answers.
            # /api/games/today exercises the API through Caddy; / exercises the web app.
            echo "Smoke test…"; ok=0
            for i in $(seq 1 30); do
              if curl -fsS -o /dev/null "https://${{ vars.DOMAIN }}/api/games/today" \
                 && curl -fsS -o /dev/null "https://${{ vars.DOMAIN }}/"; then ok=1; break; fi
              sleep 3
            done
            if [ "$ok" != 1 ]; then
              echo "Smoke test failed — the site did not come up."
              docker compose -f compose.prod.yml logs --tail=80 api web mcp-server
              exit 1
            fi

            # MCP server: /healthz is internal-only, so probe it from inside the container.
            echo "MCP health…"
            if ! docker compose -f compose.prod.yml exec -T mcp-server \
                 python -c "import urllib.request; urllib.request.urlopen('http://localhost:8090/healthz')"; then
              echo "MCP server health check failed."
              docker compose -f compose.prod.yml logs --tail=80 mcp-server
              exit 1
            fi
            echo "Smoke test passed."
