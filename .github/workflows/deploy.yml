name: Deploy

# Push to main → build images → deploy to the VPS. The test gate is the PR pipeline
# (api-ci.yml); enable branch protection requiring "API CI" so nothing reaches main
# without passing tests.
on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diamond-api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diamond-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ vars.DOMAIN }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diamond-web:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diamond-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ingester
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ingester/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diamond-ingester:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/diamond-ingester:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/diamond
            git pull --ff-only
            # Pin this deploy to the exact images just built.
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f compose.prod.yml pull
            docker compose -f compose.prod.yml up -d   # flyway migrates before api starts
            docker image prune -f
