name: MCP Server CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "mcp-server/**"
      - ".github/workflows/mcp-server-ci.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check diamond_mcp/ tests/

      - name: Type check
        run: uv run mypy diamond_mcp/

      - name: Test
        run: uv run pytest -q
