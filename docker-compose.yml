services:
  postgres:
    image: postgres:16
    container_name: diamond-postgres
    environment:
      POSTGRES_DB: diamond
      POSTGRES_USER: diamond
      POSTGRES_PASSWORD: diamond
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diamond -d diamond"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: diamond-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  flyway:
    image: flyway/flyway:10
    container_name: diamond-flyway
    command: >
      -url=jdbc:postgresql://postgres:5432/diamond
      -user=diamond
      -password=diamond
      -locations=filesystem:/flyway/sql
      migrate
    volumes:
      - ./db/migrations:/flyway/sql
    depends_on:
      postgres:
        condition: service_healthy

  # ── Observability stack (scrapes the API running on the host via mvn spring-boot:run) ──
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: diamond-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: diamond-grafana
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: diamond-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP (API exports here)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  postgres_data:
