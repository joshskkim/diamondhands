spring:
  application:
    name: diamond-api   # becomes the OTel service.name in Jaeger
  datasource:
    url: jdbc:postgresql://localhost:5432/diamond
    username: diamond
    password: diamond
    hikari:
      connection-timeout: 5000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: false   # Migrations are run by docker-compose flyway service
  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 2s
  cache:
    type: redis
    redis:
      time-to-live: 300000   # 5 minutes

diamond:
  sim-prop-blend:
    # Blend the Monte-Carlo simulator's per-batter prop estimate into the closed-form
    # prop-board probability (before empirical shrinkage). OFF until the per-market
    # weights are fit on the backtest harness; weight 0 == closed-form only.
    enabled: ${DIAMOND_SIM_PROP_BLEND_ENABLED:false}
    weight-hit: ${DIAMOND_SIM_PROP_BLEND_WEIGHT_HIT:0.0}
    weight-hr: ${DIAMOND_SIM_PROP_BLEND_WEIGHT_HR:0.0}
    weight-k: ${DIAMOND_SIM_PROP_BLEND_WEIGHT_K:0.0}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      # Registers the livenessState/readinessState contributors outside Kubernetes
      # so the probe groups below resolve.
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,redis
  metrics:
    tags:
      application: diamond-api
    distribution:
      # Let Prometheus compute true p50/p95/p99 from server-side histograms
      # rather than client-side estimates.
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 10ms,25ms,50ms,100ms,200ms,500ms,1s
  tracing:
    sampling:
      probability: 1.0   # dev: trace every request; lower in prod
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
  opentelemetry:
    resource-attributes:
      service.name: diamond-api

app:
  auth:
    # HS256 signing key for session JWTs. MUST be overridden in prod (>= 32 bytes).
    jwt-secret: ${AUTH_JWT_SECRET:dev-insecure-change-me-please-32-bytes-minimum-secret-key-0001}
    session-ttl: ${AUTH_SESSION_TTL:7d}
    # Secure cookie requires HTTPS; false for local http dev, true in prod.
    cookie-secure: ${AUTH_COOKIE_SECURE:false}
  stripe:
    # Billing is disabled (endpoints 503) unless a secret key is present. Test keys (sk_test_…)
    # in dev; live keys only in prod. The webhook secret comes from `stripe listen` (dev) or the
    # dashboard endpoint (prod). Price ids are the Stripe Price objects for the Pro tier.
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    price-monthly: ${STRIPE_PRICE_MONTHLY:}
    price-annual: ${STRIPE_PRICE_ANNUAL:}
    # Where Checkout/Portal redirect the user back to (the web app's base URL).
    web-base-url: ${WEB_BASE_URL:http://localhost:3000}
  ai:
    # "Ask Diamond" natural-language query. Disabled unless a key is present so the
    # endpoint degrades gracefully (503) rather than erroring when no key is configured.
    enabled: ${AI_ENABLED:false}
    api-key: ${GEMINI_API_KEY:}
    model: ${AI_MODEL:gemini-2.5-flash}
    # Caps so a public endpoint can't run away: answer length + tool-call rounds.
    max-tokens: ${AI_MAX_TOKENS:3000}
    max-tool-iterations: ${AI_MAX_TOOL_ITERATIONS:6}
  agent:
    # The Diamond Analyst (stateful, authenticated agent). Reuses the same Gemini client/key
    # as ai.* above; only overrides the caps and the (stronger) judge model for the debate.
    judge-model: ${AGENT_JUDGE_MODEL:gemini-2.5-pro}
    max-tool-iterations: ${AGENT_MAX_TOOL_ITERATIONS:8}
    debate-tool-iterations: ${AGENT_DEBATE_TOOL_ITERATIONS:3}
    rate:
      # Per-user throttle on the (paid) agent endpoint: a sliding 1-minute window + a hard daily cap.
      per-minute: ${AGENT_RATE_PER_MINUTE:5}
      per-day: ${AGENT_RATE_PER_DAY:100}

# Sentry error tracking. Auto-disabled when SENTRY_DSN is empty (opt-in, like AI/Stripe),
# so dev/CI never ship events. `release` tags issues with the deployed image so you can see
# which build an error class started on. ERROR logs become issues (carrying the MDC traceId,
# which links back to the Jaeger trace). PII is off by default — don't log secrets.
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:local}
  release: ${SENTRY_RELEASE:}
  send-default-pii: false
  # Performance tracing is sampled separately from errors; default off (errors are free-ish).
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.0}
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info
