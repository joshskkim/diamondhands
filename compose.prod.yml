# Production stack — single host, fronted by Caddy (auto-TLS, same-origin routing).
# Bring up:   docker compose -f compose.prod.yml up -d
# Run a job:  docker compose -f compose.prod.yml run --rm ingester daily
# Config comes from a sibling `.env` (see .env.prod.example). Only Caddy is reachable
# from the public internet; everything else is on the internal network.
services:
  caddy:
    image: caddy:2.8
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:-}
    depends_on: [web, api, mcp-server]

  web:
    image: ${REGISTRY:-ghcr.io/joshskkim}/diamond-web:${IMAGE_TAG:-latest}
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}
        # Browser Sentry DSN (optional) — inlined at build time. Empty => disabled.
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_SENTRY_RELEASE: ${IMAGE_TAG:-}
    restart: unless-stopped
    expose: ["3000"]

  api:
    image: ${REGISTRY:-ghcr.io/joshskkim}/diamond-api:${IMAGE_TAG:-latest}
    build:
      context: ./api
    restart: unless-stopped
    expose: ["8080"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/diamond
      SPRING_DATASOURCE_USERNAME: diamond
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      # MLB runs on US time — compute "today's slate" in Eastern, not the host's UTC.
      TZ: ${TZ:-America/New_York}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_COOKIE_SECURE: "true"
      # Stripe billing (optional — endpoints 503 without a secret key). Use LIVE keys here.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_MONTHLY: ${STRIPE_PRICE_MONTHLY:-}
      STRIPE_PRICE_ANNUAL: ${STRIPE_PRICE_ANNUAL:-}
      WEB_BASE_URL: https://${DOMAIN}
      # Sentry error tracking (optional — disabled without a DSN). Release = deployed image tag.
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: production
      SENTRY_RELEASE: ${IMAGE_TAG:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.1"
      # AI (Ask Diamond + the Diamond Analyst agent). Disabled without a key — endpoints 503.
      AI_ENABLED: ${AI_ENABLED:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AGENT_JUDGE_MODEL: ${AGENT_JUDGE_MODEL:-gemini-2.5-pro}
      # Shared key guarding the server-to-server debate gate (record-picks -> /api/debate/pick).
      AGENT_INTERNAL_KEY: ${AGENT_INTERNAL_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully

  mcp-server:
    image: ${REGISTRY:-ghcr.io/joshskkim}/diamond-mcp:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    restart: unless-stopped
    expose: ["8090"]
    environment:
      DIAMOND_API_URL: http://api:8080
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8090"
      # Must be set in .env — without keys auth is OFF, and /mcp is publicly routed.
      MCP_API_KEYS: ${MCP_API_KEYS}
      # Per-client token-bucket limits for the public endpoint (defaults shown; tune in .env).
      MCP_RATE_LIMIT_RPS: ${MCP_RATE_LIMIT_RPS:-5}
      MCP_RATE_LIMIT_BURST: ${MCP_RATE_LIMIT_BURST:-20}
      OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_SERVICE_NAME: diamond-mcp
    # The image has no curl; probe /healthz with Python (matches the deploy smoke test).
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8090/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      api:
        condition: service_started

  ingester:
    image: ${REGISTRY:-ghcr.io/joshskkim}/diamond-ingester:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: ingester/Dockerfile
    profiles: ["jobs"]   # run-only (docker compose run); never started by `up`
    environment:
      DATABASE_URL: postgresql://diamond:${DB_PASSWORD}@postgres:5432/diamond
      ODDS_API_KEY: ${ODDS_API_KEY:-}
      # record-picks calls the API over the compose network (the `api` service, not
      # localhost) — without this the nightly silently skips and no picks are recorded.
      DIAMOND_API_URL: http://api:8080
      TZ: ${TZ:-America/New_York}
      # Diamond Analyst nightly jobs: score-agent-recs, agent-eval, daily-briefing. The eval
      # account signs into the API; the briefing posts to Discord; the eval judge uses Gemini.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AGENT_JUDGE_MODEL: ${AGENT_JUDGE_MODEL:-gemini-2.5-pro}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      AGENT_EVAL_EMAIL: ${AGENT_EVAL_EMAIL:-}
      AGENT_EVAL_PASSWORD: ${AGENT_EVAL_PASSWORD:-}
      # record-picks sends this to the debate gate; blank => gate off (mechanical board).
      AGENT_INTERNAL_KEY: ${AGENT_INTERNAL_KEY:-}
    volumes:
      - pybaseball_cache:/root/.pybaseball
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: diamond
      POSTGRES_USER: diamond
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diamond -d diamond"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  flyway:
    image: flyway/flyway:10
    command: >
      -url=jdbc:postgresql://postgres:5432/diamond
      -user=diamond -password=${DB_PASSWORD}
      -locations=filesystem:/flyway/sql -connectRetries=10 migrate
    volumes:
      - ./db/migrations:/flyway/sql:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ── Observability (bound to localhost only; reach via SSH tunnel) ──
  # Host metrics (disk / CPU / memory) for Prometheus. The root filesystem is bind-mounted
  # read-only so node_filesystem_* reflects the real VPS disk — the signal behind the
  # DiskSpaceLow alert. Without this Prometheus only sees app metrics and is blind to the box
  # filling up (on 2026-07-04 the disk hit 100% and the first symptom was Postgres crashing).
  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|run)($$|/)'
    volumes:
      - /:/host:ro,rslave

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    ports: ["127.0.0.1:9090:9090"]
    volumes:
      - ./monitoring/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    depends_on: [alertmanager]

  # Routes firing Prometheus alerts to email (SMTP). Opt-in: with no ALERT_SMTP_SMARTHOST
  # it starts with a null receiver and drops notifications. Config is rendered from env at
  # startup (see monitoring/alertmanager-entrypoint.sh) so no SMTP secrets are committed.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    ports: ["127.0.0.1:9093:9093"]
    entrypoint: ["/bin/sh", "/etc/alertmanager/entrypoint.sh"]
    environment:
      ALERT_SMTP_SMARTHOST: ${ALERT_SMTP_SMARTHOST:-}
      ALERT_SMTP_FROM: ${ALERT_SMTP_FROM:-}
      ALERT_SMTP_TO: ${ALERT_SMTP_TO:-}
      ALERT_SMTP_USERNAME: ${ALERT_SMTP_USERNAME:-}
      ALERT_SMTP_PASSWORD: ${ALERT_SMTP_PASSWORD:-}
      ALERT_SMTP_REQUIRE_TLS: ${ALERT_SMTP_REQUIRE_TLS:-true}
    volumes:
      - ./monitoring/alertmanager-entrypoint.sh:/etc/alertmanager/entrypoint.sh:ro
      - alertmanager_data:/alertmanager

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    ports: ["127.0.0.1:3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Interpolated into the Postgres datasource provisioning (agent eval dashboard).
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on: [prometheus, postgres]

  jaeger:
    image: jaegertracing/all-in-one:1.60
    restart: unless-stopped
    ports: ["127.0.0.1:16686:16686"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  pybaseball_cache:
